<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Globe</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            background-color: black;
        }
        .navbar {
            height: 50px;
            background-color: #000;
            color: #0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-family: monospace;
            border-bottom: 1px solid #0f0;
        }
        .navbar .title {
            font-weight: bold;
            font-size: 1.5em;
        }
        .navbar .buttons {
            display: flex;
            gap: 10px;
        }
        .navbar button {
            background-color: #333;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 5px 10px;
            cursor: pointer;
            font-family: monospace;
        }
        .navbar button:hover {
            background-color: #0f0;
            color: #000;
        }
        #globe-container {
            width: 100%;
            height: calc(100vh - 50px);
            transition: margin-left 0.3s, width 0.3s;
        }
        .panel-open #globe-container {
            margin-left: 250px;
            width: calc(100% - 250px);
        }
        .panel {
            position: absolute;
            top: 50px;
            left: 0;
            width: 250px;
            height: calc(100vh - 50px);
            background-color: #111;
            color: #0f0;
            font-family: monospace;
            border-right: 1px solid #0f0;
            transition: transform 0.3s;
            z-index: 10;
        }
        .panel.collapsed {
            transform: translateX(-250px);
        }
        .panel-toggle {
            position: fixed;
            top: 50px;
            left: 0;
            width: 30px;
            height: calc(100vh - 50px);
            background-color: #222;
            color: #0f0;
            border: none;
            border-right: 1px solid #0f0;
            cursor: pointer;
            font-family: monospace;
            font-size: 18px;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 11;
        }
        .panel-toggle:hover {
            background-color: #0f0;
            color: #000;
        }
        .panel-toggle::before {
            content: '‹';
        }
        .panel.collapsed .panel-toggle::before {
            content: '›';
        }
        .panel-content {
            padding: 20px;
            padding-left: 50px;
            overflow-y: auto;
            height: 100%;
        }
        .panel h3 {
            margin-top: 0;
            text-align: center;
        }
        .layer {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .layer input[type="checkbox"] {
            display: none;
        }
        .layer label {
            display: flex;
            align-items: center;
            cursor: pointer;
            width: 100%;
        }
        .indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .switch {
            position: relative;
            width: 40px;
            height: 20px;
            background-color: #333;
            border-radius: 20px;
            margin-left: auto;
            transition: background-color 0.3s;
            overflow: hidden;
        }
        .switch .knob {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: #0f0;
            top: 2px;
            left: 2px;
            transition: transform 0.3s, background-color 0.3s;
        }
        /* styles when checkbox is checked or label.checked class present */
        input:checked + label .switch {
            background-color: #0f0 !important;
        }
        input:checked + label .switch .knob {
            transform: translateX(20px) !important;
            background-color: #000 !important;
        }
        label.checked .switch {
            background-color: #0f0 !important;
        }
        label.checked .switch .knob {
            transform: translateX(20px) !important;
            background-color: #000 !important;
        }
        .news-panel {
            position: fixed;
            top: 50px;
            right: 0;
            width: 300px;
            height: 320px;
            background-color: #111;
            color: #0f0;
            font-family: monospace;
            border-left: 1px solid #0f0;
            border-bottom: 1px solid #0f0;
            transition: transform 0.3s;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }
        .news-panel.collapsed {
            transform: translateX(300px);
        }
        .news-panel-toggle {
            position: fixed;
            top: 50px;
            right: 0;
            width: 30px;
            height: 320px;
            background-color: #222;
            color: #0f0;
            border: none;
            border-left: 1px solid #0f0;
            border-bottom: 1px solid #0f0;
            cursor: pointer;
            font-family: monospace;
            font-size: 18px;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 11;
        }
        .news-panel-toggle:hover {
            background-color: #0f0;
            color: #000;
        }
        .news-panel-toggle::before {
            content: '›';
        }
        .news-panel.collapsed .news-panel-toggle::before {
            content: '‹';
        }
        .news-header {
            padding: 10px;
            border-bottom: 1px solid #0f0;
            text-align: center;
            font-weight: bold;
            font-size: 12px;
        }
        .news-stories {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .news-story {
            padding: 10px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: background-color 0.2s;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .news-story:hover {
            background-color: #0f0;
            color: #000;
        }
        .news-headline {
            font-weight: bold;
            font-size: 11px;
            line-height: 1.3;
            margin-bottom: 5px;
        }
        .news-meta {
            font-size: 9px;
            opacity: 0.7;
        }
        .news-source {
            font-weight: bold;
            margin-bottom: 3px;
        }
        .news-timestamp {
            font-size: 8px;
            opacity: 0.6;
        }
        @keyframes ticker-scroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }
        .ticker-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 45px;
            background-color: #111;
            color: #0f0;
            font-family: monospace;
            border-top: 1px solid #0f0;
            font-size: 12px;
            transition: transform 0.3s;
            z-index: 10;
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        .ticker-bar.collapsed {
            transform: translateY(100%);
        }
        .ticker-toggle {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 35px;
            background-color: #222;
            color: #0f0;
            border: none;
            border-top: 1px solid #0f0;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 11;
        }
        .ticker-toggle:hover {
            background-color: #0f0;
            color: #000;
        }
        .ticker-toggle::before {
            content: '\u2191';
        }
        .ticker-bar.collapsed .ticker-toggle::before {
            content: '\u2193';
        }
        .ticker-content {
            display: flex;
            animation: ticker-scroll 80s linear infinite;
            padding: 0 40px;
            white-space: nowrap;
            gap: 0;
        }
        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-right: 50px;
            padding: 5px 15px;
            border-right: 1px solid #333;
            flex-shrink: 0;
        }
        .ticker-symbol {
            font-weight: bold;
            min-width: 100px;
        }
        .ticker-value {
            min-width: 80px;
            text-align: right;
        }
        .ticker-change.positive {
            color: #00ff00;
        }
        .ticker-change.negative {
            color: #ff0000;
        }
        .ticker-change {
            min-width: 60px;
            text-align: right;
            font-weight: bold;
        }\n    </style>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
</head>
<body>
    <div class="navbar">
        <div class="title">SITUATION MONITOR</div>
        <div class="buttons">
            <button>Settings</button>
            <button>Alerts</button>
            <button>Fullscreen</button>
        </div>
    </div>
    <button class="panel-toggle"></button>
    <button class="news-panel-toggle"></button>
    <div class="news-panel">
        <div class="news-header">LIVE NEWS FEED <span id="news-timestamp" style="font-size: 9px; opacity: 0.7;"></span></div>
        <div class="news-stories" id="news-stories">
            <!-- News stories will be dynamically loaded here -->
        </div>
    </div>
    <div class="panel">
        <div class="panel-content">
            <h3>Layers</h3>
            <div class="layer">
                <input type="checkbox" id="conflict-zones" checked>
                <label for="conflict-zones" onclick="window.toggleLayer(event,'conflict-zones')">
                    <div class="indicator" style="background-color: #ff0000;"></div>
                    Conflict Zones
                    <div class="switch"><div class="knob"></div></div>
                </label>
            </div>
            <div class="layer">
                <input type="checkbox" id="natural-disasters" checked>
                <label for="natural-disasters" onclick="window.toggleLayer(event,'natural-disasters')">
                    <div class="indicator" style="background-color: #000000;"></div>
                    Natural Disasters
                    <div class="switch"><div class="knob"></div></div>
                </label>
            </div>
            <div class="layer">
                <input type="checkbox" id="disease-outbreaks" checked>
                <label for="disease-outbreaks" onclick="window.toggleLayer(event,'disease-outbreaks')">
                    <div class="indicator" style="background-color: #00ff00;"></div>
                    Disease Outbreaks
                    <div class="switch"><div class="knob"></div></div>
                </label>
            </div>
            <div class="layer">
                <input type="checkbox" id="political-unrest" checked>
                <label for="political-unrest" onclick="window.toggleLayer(event,'political-unrest')">
                    <div class="indicator" style="background-color: #ff00ff;"></div>
                    Political Unrest
                    <div class="switch"><div class="knob"></div></div>
                </label>
            </div>
        </div>
    </div>
    <div id="globe-container"></div>
    <button class="ticker-toggle"></button>
    <div class="ticker-bar">
        <div class="ticker-content" id="ticker-content"></div>
    </div>
    <!-- Debug overlays removed -->

    <script>
        // Left panel toggle functionality
        const panel = document.querySelector('.panel');
        const toggleBtn = document.querySelector('.panel-toggle');
        toggleBtn.addEventListener('click', () => {
            panel.classList.toggle('collapsed');
        });

        // News panel toggle functionality
        const newsPanel = document.querySelector('.news-panel');
        const newsPanelToggle = document.querySelector('.news-panel-toggle');
        newsPanelToggle.addEventListener('click', () => {
            newsPanel.classList.toggle('collapsed');
        });

        // RSS News Feed functionality
        const rssFeeds = [
            { name: 'Reuters World', url: 'https://news.google.com/rss/search?q=when:24h+allinurl:reuters.com&ceid=US:en&hl=en-US&gl=US' },
            { name: 'Reuters Markets', url: 'https://news.google.com/rss/search?q=when:24h+allinurl:reuters.com+markets&ceid=US:en&hl=en-US&gl=US' },
            { name: 'Reuters Politics', url: 'https://news.google.com/rss/search?q=when:24h+allinurl:reuters.com+politics&ceid=US:en&hl=en-US&gl=US' },
            { name: 'BBC World', url: 'http://feeds.bbci.co.uk/news/world/rss.xml' },
            { name: 'Al Jazeera', url: 'https://www.aljazeera.com/xml/rss/all.xml' },
            { name: 'Financial Times', url: 'https://www.ft.com/rss/home' },
            { name: 'Bloomberg Markets', url: 'https://feeds.bloomberg.com/markets/news.rss' },
            { name: 'WSJ World', url: 'https://feeds.a.dj.com/rss/RSSWorldNews.xml' },
            { name: 'Defense News', url: 'https://www.defensenews.com/arc/outboundfeeds/rss/' },
            { name: 'Foreign Policy', url: 'https://news.google.com/rss/search?q=when:24h+allinurl:foreignpolicy.com&ceid=US:en&hl=en-US&gl=US' },
            { name: 'The Economist', url: 'https://www.economist.com/the-world-this-week/rss.xml' },
            { name: 'Zero Hedge', url: 'https://feeds.feedburner.com/zerohedge/feed' },
            { name: 'AP News', url: 'https://news.google.com/rss/search?q=when:24h+allinurl:apnews.com&ceid=US:en&hl=en-US&gl=US' }
        ];

        let currentNewsItems = [];

        async function fetchRSSFeeds() {
            const feedPromises = rssFeeds.map(async (feed) => {
                try {
                    const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`;
                    const response = await fetch(apiUrl);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    
                    if (data.status === 'ok' && data.items) {
                        return data.items.map(item => {
                            // Better date parsing to handle timezone issues
                            let pubDate = item.pubDate;
                            let timestamp;
                            

                            try {
                                // Parse the date string properly to handle timezone
                                let parsedDate;
                                
                                // Try different parsing approaches
                                if (pubDate.includes('T') || pubDate.includes('Z') || pubDate.includes('+')) {
                                    // ISO format or has timezone info - parse normally
                                    parsedDate = new Date(pubDate);
                                } else {
                                    // Simple date format - treat as UTC to avoid local timezone conversion
                                    const utcDateStr = pubDate.replace(/(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2}:\d{2})/, '$1T$2Z');
                                    parsedDate = new Date(utcDateStr);
                                }
                                
                                // Get UTC timestamp
                                const utcTimestamp = parsedDate.getTime();
                                
                                // Check if UTC time is reasonable (not too far in future)
                                const now = Date.now();
                                const diff = utcTimestamp - now;
                                
                                // If more than 1 hour in future, it's likely a server time issue
                                if (diff > 3600000) {
                                    timestamp = now - 300000; // 5 minutes ago as fallback
                                } else {
                                    timestamp = utcTimestamp;
                                }
                            } catch (e) {
                                // Fallback to current time if parsing fails
                                timestamp = Date.now() - 300000; // 5 minutes ago
                            }
                            

                            return {
                                title: item.title,
                                link: item.link,
                                source: feed.name,
                                pubDate: pubDate,
                                timestamp: timestamp
                            };
                        });
                    }
                    return [];
                } catch (error) {
                    console.error(`Failed to fetch ${feed.name}:`, error);
                    
                    // Log full response details for specific feeds
                    if (feed.name === 'Reuters World' || feed.name === 'AP News' || feed.name === 'Foreign Policy') {
                        console.log(`=== RSS2JSON Error Details for ${feed.name} ===`);
                        console.log('Feed URL:', feed.url);
                        console.log('API URL:', `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                        console.log('Error object:', error);
                        console.log('Error message:', error.message);
                        console.log('Error stack:', error.stack);
                        
                        // Try to get response details if available
                        if (error.response) {
                            console.log('Response status:', error.response.status);
                            console.log('Response status text:', error.response.statusText);
                            console.log('Response headers:', error.response.headers);
                            error.response.text().then(text => {
                                console.log('Response body:', text);
                            }).catch(e => {
                                console.log('Could not read response body:', e);
                            });
                        }
                        console.log(`=== End Error Details for ${feed.name} ===`);
                    }
                    
                    return [];
                }
            });

            const results = await Promise.allSettled(feedPromises);
            const allNewsItems = [];
            
            results.forEach((result, index) => {
                if (result.status === 'fulfilled' && result.value) {
                    allNewsItems.push(...result.value);
                } else {
                    console.error(`Feed ${rssFeeds[index].name} failed:`, result.reason);
                }
            });

            // Sort by timestamp (newest first) and take top 30
            allNewsItems.sort((a, b) => b.timestamp - a.timestamp);
            currentNewsItems = allNewsItems.slice(0, 30);
            
            displayNewsItems();
            updateNewsTimestamp();
        }

        function updateNewsTimestamp() {
            const timestamp = new Date().toLocaleTimeString('en-US', { 
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                timeZone: 'UTC'
            });
            
            const timestampElement = document.getElementById('news-timestamp');
            if (timestampElement) {
                timestampElement.textContent = `(UTC ${timestamp})`;
            }
        }

        function displayNewsItems() {
            const newsContainer = document.getElementById('news-stories');
            
            if (currentNewsItems.length === 0) {
                newsContainer.innerHTML = '<div style="padding: 20px; text-align: center; color: #0f0;">No news available</div>';
                return;
            }

            const now = Date.now();
            const newsHTML = currentNewsItems.map(item => {
                let timeDiff = now - item.timestamp;
                let timeString;
                
                // Handle future dates (common with RSS feeds)
                if (timeDiff < 0) {
                    timeString = 'just now';
                } else {
                    const minutesAgo = Math.floor(timeDiff / (1000 * 60));
                    const hoursAgo = Math.floor(timeDiff / (1000 * 60 * 60));
                    const daysAgo = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
                    
                    if (minutesAgo < 60) {
                        timeString = `${minutesAgo} mins ago`;
                    } else if (hoursAgo < 24) {
                        timeString = `${hoursAgo} hours ago`;
                    } else {
                        timeString = `${daysAgo} days ago`;
                    }
                }
                
                return `
                    <div class="news-story" onclick="window.open('${item.link}', '_blank')">
                        <div class="news-headline">
                            ${item.title}
                        </div>
                        <div class="news-meta">
                            <div class="news-source">${item.source}</div>
                            <div class="news-timestamp">${timeString}</div>
                        </div>
                    </div>
                `;
            }).join('');

            newsContainer.innerHTML = newsHTML;
        }

        // Initial fetch and then update every 5 minutes
        fetchRSSFeeds();
        setInterval(fetchRSSFeeds, 300000);

        
        // Ticker bar toggle functionality
        const tickerBar = document.querySelector('.ticker-bar');
        const tickerToggle = document.querySelector('.ticker-toggle');
        tickerToggle.addEventListener('click', () => {
            tickerBar.classList.toggle('collapsed');
        });

        function setStatus(text) { console.log(text); }
        
        // Define toggleLayer globally so HTML onclick handlers can access it
        // It will be properly connected to the globe once initialization completes
        window.toggleLayer = null;
        let updateGlobePointsRef = null;
        
        function createThreeFallback(container) {
            setStatus('Using fallback Three.js sphere', '#ff0');
            try {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
                camera.position.z = 2.5;

                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(container.clientWidth, container.clientHeight);
                container.innerHTML = '';
                container.appendChild(renderer.domElement);

                const light = new THREE.DirectionalLight(0xffffff, 1);
                light.position.set(5, 3, 5);
                scene.add(light);
                scene.add(new THREE.AmbientLight(0x333333));

                const geometry = new THREE.SphereGeometry(1, 32, 32);
                const material = new THREE.MeshPhongMaterial({ color: 0x2266ff, shininess: 30 });
                const sphere = new THREE.Mesh(geometry, material);
                scene.add(sphere);

                function animate() {
                    requestAnimationFrame(animate);
                    sphere.rotation.y += 0.005;
                    renderer.render(scene, camera);
                }
                animate();

                window.addEventListener('resize', () => {
                    camera.aspect = container.clientWidth / container.clientHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(container.clientWidth, container.clientHeight);
                });
            } catch (fallbackErr) {
                console.error('Fallback also failed:', fallbackErr);
                container.innerHTML = '<div style="color: #ff0; text-align: center; padding: 20px; font-family: monospace;">Globe failed to initialize. Please refresh the page.</div>';
            }
        }

        // Try initializing Globe.gl, fall back to simple Three.js if it fails
        (function init() {
            const container = document.getElementById('globe-container');

            // remove any existing canvas or content to avoid "existing context of a different type"
            try {
                container.querySelectorAll('canvas').forEach(c => c.remove());
                container.innerHTML = '';
            } catch (e) {
                console.warn('Could not clear container before init:', e);
            }

            // Basic environment diagnostics (logged to console)
            const diag = {
                webglAvailable: !!window.WebGLRenderingContext,
                THREE_present: typeof THREE !== 'undefined',
                Globe_type: typeof (typeof Globe !== 'undefined' ? Globe : undefined),
                ThreeGlobe_type: typeof (typeof ThreeGlobe !== 'undefined' ? ThreeGlobe : undefined),
                userAgent: navigator.userAgent,
            };
            console.log('Diagnostics:', diag);

            if (!diag.webglAvailable) {
                setStatus('No WebGL support detected', '#f66');
                return createThreeFallback(container);
            }

            try {
                if (typeof Globe === 'undefined') throw new Error('Globe not found on window');

                const globeFactory = Globe()
                    .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-night.jpg')
                    .bumpImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png')
                    .showAtmosphere(true);

                const world = globeFactory(container)
                    .width(document.body.clientWidth)
                    .height(document.body.clientHeight);

                // Layer data with colors and dummy coordinates
                const layerData = {
                    'conflict-zones': {
                        color: '#ff0000',
                        points: [
                            { lat: 33.3157, lng: 44.3615 }, // Iraq
                            { lat: 33.9425, lng: 67.7052 }, // Afghanistan
                            { lat: 15.0, lng: 30.0 }, // Central Africa
                            { lat: 4.8517, lng: 31.5825 }, // DRC
                            { lat: 37.5407, lng: 36.2384 }, // Syria
                            { lat: 48.3794, lng: 31.1656 }, // Ukraine
                            { lat: 34.5199, lng: 69.2075 }, // Pakistan Border
                            { lat: 13.5086, lng: -8.8361 } // Sierra Leone
                        ]
                    },
                    'natural-disasters': {
                        color: '#000000',
                        points: [
                            { lat: 15.6521, lng: 120.5244 }, // Philippines Typhoons
                            { lat: 35.6762, lng: 139.6503 }, // Japan Earthquakes
                            { lat: -18.0, lng: 120.0 }, // Australia Fires
                            { lat: 20.0, lng: -100.0 }, // Mexico Earthquakes
                            { lat: 37.7749, lng: -122.4194 }, // California Fires
                            { lat: 32.0, lng: 35.0 }, // Middle East Droughts
                            { lat: -23.0, lng: 133.0 }, // Australia Floods
                            { lat: 10.0, lng: -84.0 } // Central America Hurricanes
                        ]
                    },
                    'disease-outbreaks': {
                        color: '#00ff00',
                        points: [
                            { lat: -1.2500, lng: 36.7674 }, // Kenya
                            { lat: -4.0383, lng: 21.7587 }, // DRC
                            { lat: 1.3521, lng: 103.8198 }, // Singapore

                    // Filter points to show only visible layers
                    const visiblePoints = allPoints.filter(p => checkedLayers.includes(p.layer));
                    console.log('Visible points:', visiblePoints.length, 'out of', allPoints.length);
                    console.log('Points by layer in visible set:', 
                        Object.keys(layerData).map(layerId => 
                            layerId + ': ' + visiblePoints.filter(p => p.layer === layerId).length

                    );
                    
                    // Update globe
                    if (world && typeof world.pointsData === 'function') {

                        world.pointRadius(getPointRadius); // layer-specific radius

                // Helper function to update visual toggle states
                const updateToggleVisuals = (layerId, isChecked) => {
                    const checkbox = document.getElementById(layerId);
                    const label = checkbox?.nextElementSibling;
                    console.log('updateToggleVisuals:', layerId, 'isChecked:', isChecked);
                    
                    if (!label) {
                        console.error('Label not found for:', layerId);
                        return;

                    const switchDiv = label.querySelector('.switch');
                    if (!switchDiv) {
                        console.error('Switch element not found in label for:', layerId);
                        return;

                    // Update the class for CSS styling
                    if (isChecked) {
                        label.classList.add('checked');
                        switchDiv.style.backgroundColor = '#0f0';

                        const knob = switchDiv.querySelector('.knob');

                        switchDiv.style.backgroundColor = '#333';
                        const knob = switchDiv.querySelector('.knob');
                        if (knob) {
                            knob.style.transform = 'translateX(0px)';

                        switchDiv.style.transition = 'background-color 0.3s';

                    const checkbox = document.getElementById(layerId);

                    checkbox.checked = !checkbox.checked;

                setStatus('Globe initialized — checking canvas');

                window.addEventListener('resize', () => {
                    world.width(document.body.clientWidth)
                         .height(document.body.clientHeight);
                });

                // After a short delay, verify canvas has content
                setTimeout(() => {
                    const canvas = container.querySelector('canvas');
                    if (!canvas) {
                        setStatus('Globe created no canvas — falling back', '#ff0');
                        showDetails('No canvas element found in container after Globe init.');
                        createThreeFallback(container);
                        return;
                    }

                        // verify canvas presence without creating other contexts
                        setStatus('Globe canvas present');
                        console.log('Globe canvas size:', { width: canvas.width, height: canvas.height });
                }, 900);

            } catch (err) {
                console.error('Globe init error:', err);
                setStatus('Globe init error — using fallback');
                console.error(err);
                createThreeFallback(container);
            }
            
            // Ensure window.toggleLayer is defined even if globe initialization failed
            if (!window.toggleLayer) {
                window.toggleLayer = (evt, layerId) => {
                    if (evt && typeof evt.preventDefault === 'function') evt.preventDefault();
                    console.log('toggleLayer called for:', layerId, '(globe not initialized)');
                    const checkbox = document.getElementById(layerId);
                    if (checkbox) {
                        checkbox.checked = !checkbox.checked;
                        console.log('Toggled:', layerId, 'to', checkbox.checked);
                    }
                };
            }
        })();

        (function () {
            // ── Finnhub free API key ──────────────────────────────────────────────

            const FINNHUB_TOKEN = 'd6popd9r01qk0cf1cb1gd6popd9r01qk0cf1cb20';
            const FRED_TOKEN    = '8bf37d5dabb583328735f4d76b2a3b71';
            const FRED_SERIES   = { '^TNX': 'DGS10', '^IRX': 'DGS2', '^GE10Y': 'IRLTLT01DEM156N' };
            // ─────────────────────────────────────────────────────────────────────

            // Finnhub uses different symbol formats for commodity futures.

            const TO_FINNHUB = {

            };

            const TICKERS = [
                // Indices — Yahoo Finance via corsproxy.io, Finnhub ETF fallback for US
                { label: 'S&P 500',       symbol: '^GSPC',     type: 'index',     source: 'indices' },
                { label: 'DOW',           symbol: '^DJI',      type: 'index',     source: 'indices' },
                { label: 'NASDAQ',        symbol: '^IXIC',     type: 'index',     source: 'indices' },
                { label: 'FTSE 100',      symbol: '^FTSE',     type: 'index',     source: 'indices' },

                { label: 'DAX',           symbol: '^GDAXI',    type: 'index',     source: 'indices' },

                { label: 'Hang Seng',     symbol: '^HSI',      type: 'index',     source: 'indices' },
                { label: 'ASX 200',       symbol: '^AXJO',     type: 'index',     source: 'indices' },
                { label: 'DXY Index',     symbol: 'DX-Y.NYB',  type: 'index',     source: 'indices' },
                // Commodities — Finnhub (futures symbols, native CORS)
                { label: 'WTI Crude',     symbol: 'CL=F',      type: 'commodity', source: 'finnhub' },
                { label: 'Brent Crude',   symbol: 'BZ=F',      type: 'commodity', source: 'finnhub' },
                { label: 'Natural Gas',   symbol: 'NG=F',      type: 'commodity', source: 'finnhub' },
                { label: 'Gold',          symbol: 'GC=F',      type: 'commodity', source: 'finnhub' },
                { label: 'Silver',        symbol: 'SI=F',      type: 'commodity', source: 'finnhub' },
                { label: 'Copper',        symbol: 'HG=F',      type: 'commodity', source: 'finnhub' },
                { label: 'Wheat',         symbol: 'ZW=F',      type: 'commodity', source: 'finnhub' },
                { label: 'Corn',          symbol: 'ZC=F',      type: 'commodity', source: 'finnhub' },
                // Bonds — FRED (direct fetch works from real HTTP origins, not file://)
                { label: 'US 10Y',        symbol: '^TNX',      type: 'bond',      source: 'fred' },
                { label: 'US 2Y',         symbol: '^IRX',      type: 'bond',      source: 'fred' },
                { label: 'Germany 10Y',   symbol: '^GE10Y',    type: 'bond',      source: 'fred' },
                // Forex — open.er-api.com (free, no key, native CORS)
                { label: 'EUR/USD', symbol: 'EUR', type: 'forex', source: 'forex', invert: true  },
                { label: 'GBP/USD', symbol: 'GBP', type: 'forex', source: 'forex', invert: true  },
                { label: 'USD/JPY', symbol: 'JPY', type: 'forex', source: 'forex', invert: false },
                { label: 'USD/CNY', symbol: 'CNY', type: 'forex', source: 'forex', invert: false },
                { label: 'USD/RUB', symbol: 'RUB', type: 'forex', source: 'forex', invert: false },
                { label: 'USD/CHF', symbol: 'CHF', type: 'forex', source: 'forex', invert: false },
                // Crypto — CoinGecko (free, no key, native CORS)
                { label: 'BTC/USD', symbol: 'bitcoin',  type: 'crypto', source: 'coingecko' },
                { label: 'ETH/USD', symbol: 'ethereum', type: 'crypto', source: 'coingecko' },
            ];

            // Build ticker DOM
            const tickerContent = document.getElementById('ticker-content');
            [1, 2].forEach(() => {
                TICKERS.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'ticker-item';
                    div.dataset.symbol = t.symbol;
                    div.innerHTML =
                        `<span class="ticker-symbol">${t.label}</span>` +
                        `<span class="ticker-value">--</span>` +
                        `<span class="ticker-change">--</span>`;
                    tickerContent.appendChild(div);
                });
            });

            function formatPrice(price, type) {
                if (type === 'bond')  return price.toFixed(2) + '%';
                if (type === 'forex') return price.toFixed(4);
                if (price >= 1000)   return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                return price.toFixed(2);
            }

            function formatChange(pct, type) {
                const sign = pct >= 0 ? '+' : '';
                if (type === 'bond') return sign + pct.toFixed(1) + 'bps';
                return sign + pct.toFixed(2) + '%';
            }

            function applyQuote(symbol, price, pct) {
                const ticker = TICKERS.find(t => t.symbol === symbol);
                document.querySelectorAll(`.ticker-item[data-symbol="${symbol}"]`).forEach(item => {
                    const valueEl = item.querySelector('.ticker-value');
                    const changeEl = item.querySelector('.ticker-change');
                    if (price == null) {
                        valueEl.textContent = 'N/A';
                        changeEl.textContent = '--';
                        changeEl.className = 'ticker-change';
                    } else {
                        valueEl.textContent = formatPrice(price, ticker.type);
                        if (pct != null) {
                            changeEl.textContent = formatChange(pct, ticker.type);
                            changeEl.className = 'ticker-change ' + (pct >= 0 ? 'positive' : 'negative');
                        } else {
                            changeEl.textContent = '--';
                            changeEl.className = 'ticker-change';
                        }
                    }
                });
            }

            // ── Data Fetching Pipeline ────────────────────────────────────────────

            // ETF proxies for US indices: used as Finnhub fallback when Yahoo fails.
            // Note: ETF prices differ from index point values but % change is comparable.
            const ETF_PROXY = {
                '^GSPC':    'SPY',   // S&P 500
                '^DJI':     'DIA',   // Dow Jones
                '^IXIC':    'QQQ',   // NASDAQ 100
                'DX-Y.NYB': 'UUP',   // US Dollar Index
            };

            function updateTimestamp() {
                const ts = new Date().toLocaleTimeString('en-US', {
                    hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'UTC'
                });
                let el = document.querySelector('.ticker-timestamp');
                if (!el) {
                    el = document.createElement('div');
                    el.className = 'ticker-timestamp';
                    el.style.cssText = 'position:fixed;bottom:48px;left:10px;color:#0f0;font-family:monospace;font-size:10px;opacity:0.7;z-index:10;';
                    document.body.appendChild(el);
                }
                el.textContent = `Updated: ${ts} UTC`;
            }

            // Finnhub: commodities — one request per symbol, native CORS, no proxy needed.
            // Symbols returning c=0 are unsupported on the free tier; logged and skipped.
            async function fetchFinnhub() {
                const tickers = TICKERS.filter(t => t.source === 'finnhub');
                let ok = 0;
                await Promise.allSettled(
                    tickers.map(async t => {
                        const fsym = TO_FINNHUB[t.symbol] || t.symbol;
                        try {
                            const resp = await fetch(
                                `https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(fsym)}&token=${FINNHUB_TOKEN}`,
                                { signal: AbortSignal.timeout(8000) }
                            );
                            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                            const d = await resp.json();
                            if (!d.c || d.c === 0) {
                                console.warn(`[Finnhub] ${t.label} (${fsym}): zero price — unsupported on free tier`);
                                applyQuote(t.symbol, null, null);
                                return;
                            }
                            applyQuote(t.symbol, d.c, d.dp ?? null);
                            ok++;
                        } catch (e) {
                            console.warn(`[Finnhub] ${t.label}:`, e.message);
                            applyQuote(t.symbol, null, null);
                        }
                    })
                );
                return { ok, total: tickers.length };
            }

            // Indices: primary = Yahoo Finance via corsproxy.io (CORS proxy required — Yahoo
            // blocks direct browser requests). Fallback = Finnhub ETF proxy for US indices.
            // corsproxy.io is more reliable than allorigins.win for Yahoo's chart API.
            async function fetchIndices() {
                const tickers = TICKERS.filter(t => t.source === 'indices');
                let ok = 0;
                await Promise.allSettled(
                    tickers.map(async t => {
                        let success = false;

                        // Attempt 1: Yahoo Finance via corsproxy.io
                        try {
                            const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(t.symbol)}?interval=1d&range=1d`;
                            const resp = await fetch(
                                `https://corsproxy.io/?url=${encodeURIComponent(yahooUrl)}`,
                                { signal: AbortSignal.timeout(10000) }
                            );
                            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                            const data = await resp.json();
                            const meta = data?.chart?.result?.[0]?.meta;
                            if (!meta) throw new Error('no chart result');
                            const price = meta.regularMarketPrice;
                            const prev  = meta.previousClose ?? meta.chartPreviousClose;
                            if (!price || price === 0) throw new Error('zero price');
                            const pct = prev ? ((price - prev) / prev) * 100 : null;
                            applyQuote(t.symbol, price, pct);
                            ok++;
                            success = true;
                        } catch (e) {
                            console.warn(`[Indices/Yahoo] ${t.label}:`, e.message);
                        }

                        // Attempt 2: Finnhub with ETF proxy (US indices only)
                        if (!success && ETF_PROXY[t.symbol]) {
                            const fsym = ETF_PROXY[t.symbol];
                            try {
                                const resp = await fetch(
                                    `https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(fsym)}&token=${FINNHUB_TOKEN}`,
                                    { signal: AbortSignal.timeout(8000) }
                                );
                                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                                const d = await resp.json();
                                if (!d.c || d.c === 0) throw new Error('zero — ETF not supported');
                                applyQuote(t.symbol, d.c, d.dp ?? null);
                                ok++;
                                success = true;
                                console.info(`[Indices] ${t.label}: using ETF proxy ${fsym} via Finnhub`);
                            } catch (e) {
                                console.warn(`[Indices/Finnhub-ETF] ${t.label} (${fsym}):`, e.message);
                            }
                        }

                        if (!success) {
                            applyQuote(t.symbol, null, null);
                            console.warn(`[Indices] ${t.label}: all sources failed — showing N/A`);
                        }
                    })
                );
                return { ok, total: tickers.length };
            }

            // FRED: US Treasury and German bond yields — daily data, poll max every 30 min.
            // Internal guard prevents hammering FRED on every 60-second master cycle.
            let lastFredFetch = 0;
            async function fetchFred(force = false) {
                const now = Date.now();
                if (!force && now - lastFredFetch < 30 * 60 * 1000) {
                    return { ok: 0, total: 0, skipped: true };
                }
                lastFredFetch = now;
                const tickers = TICKERS.filter(t => t.source === 'fred');
                let ok = 0;
                await Promise.allSettled(
                    tickers.map(async t => {
                        const series = FRED_SERIES[t.symbol];
                        if (!series) { applyQuote(t.symbol, null, null); return; }
                        try {
                            const resp = await fetch(
                                `https://api.stlouisfed.org/fred/series/observations?series_id=${series}&api_key=${FRED_TOKEN}&sort_order=desc&limit=5&file_type=json`,
                                { signal: AbortSignal.timeout(8000) }
                            );
                            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                            const data = await resp.json();
                            const obs = (data.observations || []).filter(o => o.value !== '.');
                            if (!obs.length) throw new Error('no observations');
                            const current = parseFloat(obs[0].value);
                            const prev    = obs.length >= 2 ? parseFloat(obs[1].value) : null;
                            // Yield change in basis points (1% = 100bps)
                            applyQuote(t.symbol, current, prev != null ? (current - prev) * 100 : null);
                            ok++;
                        } catch (e) {
                            console.warn(`[FRED] ${t.label}:`, e.message);
                            applyQuote(t.symbol, null, null);
                        }
                    })
                );
                return { ok, total: tickers.length };
            }

            // Forex: open.er-api.com — free, no key, native CORS, ~hourly updates.
            async function fetchForex() {
                const tickers = TICKERS.filter(t => t.source === 'forex');
                let ok = 0;
                try {
                    const resp = await fetch('https://open.er-api.com/v6/latest/USD', {
                        signal: AbortSignal.timeout(10000)
                    });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const { rates } = await resp.json();
                    tickers.forEach(t => {
                        const rate = rates[t.symbol];
                        if (rate == null) { applyQuote(t.symbol, null, null); return; }
                        applyQuote(t.symbol, t.invert ? 1 / rate : rate, null);
                        ok++;
                    });
                } catch (e) {
                    console.warn('[Forex]:', e.message);
                    tickers.forEach(t => applyQuote(t.symbol, null, null));
                }
                return { ok, total: tickers.length };
            }

            // CoinGecko: BTC and ETH — free, no key, native CORS, real-time prices.
            async function fetchCrypto() {
                const tickers = TICKERS.filter(t => t.source === 'coingecko');
                const ids = tickers.map(t => t.symbol).join(',');
                let ok = 0;
                try {
                    const resp = await fetch(
                        `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`,
                        { signal: AbortSignal.timeout(10000) }
                    );
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const data = await resp.json();
                    tickers.forEach(t => {
                        const q = data[t.symbol];
                        if (q?.usd) ok++;
                        applyQuote(t.symbol, q?.usd ?? null, q?.usd_24h_change ?? null);
                    });
                } catch (e) {
                    console.warn('[CoinGecko]:', e.message);
                    tickers.forEach(t => applyQuote(t.symbol, null, null));
                }
                return { ok, total: tickers.length };
            }

            // Master fetch: all sources run in parallel via Promise.allSettled so one
            // failure never crashes others. Per-source rate limits:
            //   Crypto & Markets: 60 sec  (CoinGecko min / Finnhub 60 calls/min)
            //   Indices:          60 sec  (Yahoo proxy)
            //   Forex:             5 min  (open.er-api updates hourly)
            //   FRED:             30 min  (daily data — also guarded inside fetchFred)
            let cycleCount = 0;
            async function fetchAll() {
                cycleCount++;
                const runForex = cycleCount % 5 === 1;   // every 5 min
                const runFred  = cycleCount % 30 === 1;  // every 30 min

                const [crypto, finnhub, indices, forex, fred] = await Promise.allSettled([
                    fetchCrypto(),
                    fetchFinnhub(),
                    fetchIndices(),
                    runForex ? fetchForex() : Promise.resolve({ ok: 0, total: 0, skipped: true }),
                    runFred  ? fetchFred(true) : fetchFred(false),
                ]);

                updateTimestamp();

                const fmt = (r, label) => {
                    if (r.status !== 'fulfilled' || r.value?.skipped) return null;
                    const v = r.value;
                    return `${label}: ${v.ok}/${v.total} OK`;
                };
                const parts = [
                    fmt(crypto,  'CoinGecko'),
                    fmt(finnhub, 'Finnhub'),
                    fmt(indices, 'Indices'),
                    runForex ? fmt(forex, 'Forex') : null,
                    runFred  ? fmt(fred,  'FRED')  : null,
                ].filter(Boolean);
                console.log(`[Ticker] Fetch cycle ${cycleCount} complete — ${parts.join(', ')}`);
            }

            // Initial load, then poll every 60 seconds (each source respects its own rate limit)
            fetchAll();
            setInterval(fetchAll, 60_000);
        })();
